<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創造プロセス倶楽部 告知文ジェネレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">✨</div>
                <h1>創造プロセス倶楽部</h1>
            </div>
            <h2>告知文ジェネレーター</h2>
            <p>毎月のnote記事用の告知文をAIで自動生成します。</p>
        </header>

        <main>
            <div class="card setup-card">
                <h3><span class="icon">🔑</span> API設定</h3>
                <div class="form-group">
                    <label for="apiKey">Claude API キー <span class="required">必須</span></label>
                    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." required>
                    <small>※APIキーはブラウザ上でのみ使用され、外部に保存されることはありません。</small>
                </div>
                <div class="form-group">
                    <label for="modelName">モデル名 <span class="optional">任意</span></label>
                    <input type="text" id="modelName" value="claude-3-5-sonnet-20241022" placeholder="claude-3-5-sonnet-20241022">
                    <small>※講座などで指定のモデル名がある場合はここを変更してください。</small>
                </div>
            </div>

            <div class="content-wrapper">
                <div class="card form-card">
                    <h3><span class="icon">📝</span> 告知内容の入力</h3>
                    <form id="generatorForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="month">月 <span class="required">必須</span></label>
                                <input type="text" id="month" placeholder="例：6月" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="theme1">テーマ① <span class="required">必須</span></label>
                            <input type="text" id="theme1" placeholder="例：創造性を高める日常の習慣" required>
                        </div>

                        <div class="form-group">
                            <label for="theme2">テーマ② <span class="optional">任意</span></label>
                            <input type="text" id="theme2" placeholder="例：AIを活用したアイデア出しのコツ">
                        </div>

                        <div class="form-group">
                            <label for="datetime">日時 <span class="required">必須</span></label>
                            <input type="text" id="datetime" placeholder="例：6月11日（水）19:00-21:00" required>
                        </div>

                        <div class="form-group">
                            <label for="venue">会場 <span class="required">必須</span></label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="venue" value="zoom" checked>
                                    <span class="radio-custom"></span>
                                    zoom
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="venue" value="都内会場">
                                    <span class="radio-custom"></span>
                                    都内会場
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="link">申込みリンク <span class="required">必須</span></label>
                            <input type="url" id="link" placeholder="https://..." required>
                        </div>

                        <button type="submit" id="generateBtn" class="primary-btn">
                            <span class="btn-text">告知文を生成する</span>
                            <span class="loader" id="loader" style="display: none;"></span>
                        </button>
                    </form>
                </div>

                <div class="card result-card">
                    <div class="result-header">
                        <h3><span class="icon">✨</span> 生成結果</h3>
                        <button id="copyBtn" class="secondary-btn" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            全文コピー
                        </button>
                    </div>
                    <div class="result-body">
                        <textarea id="resultArea" placeholder="生成された告知文がここに表示されます。編集も可能です。" disabled></textarea>
                    </div>
                    <div id="errorMessage" class="error-message" style="display: none;"></div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
